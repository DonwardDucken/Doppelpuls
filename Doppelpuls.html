<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Doppelpuls - Dynamische Fusion</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0212;
            color: white;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .vibration-effect {
            position: fixed;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            pointer-events: none;
            box-shadow: inset 0 0 0 0px rgba(255, 255, 255, 0);
            transition: box-shadow 0.08s ease-out;
            z-index: 50;
            will-change: box-shadow;
            backface-visibility: hidden;
        }
        #serial-panel {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(10, 2, 18, 0.54);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            backdrop-filter: blur(8px);
            z-index: 120;
        }
        #serial-panel button {
            min-height: 28px;
            padding: 0 10px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
            font-size: 11px;
            cursor: pointer;
        }
        #serial-panel button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.16); }
        #serial-panel button:disabled { cursor: default; opacity: 0.4; }
        #serial-status {
            min-width: 90px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            white-space: nowrap;
        }
        #serial-values {
            color: rgba(255, 255, 255, 0.38);
            font-family: monospace;
            font-size: 10px;
            white-space: nowrap;
        }

    </style>

    <!-- Tone.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>

<div id="vibration" class="vibration-effect"></div>
<div id="serial-panel">
    <button id="connect-button"   type="button">Arduino</button>
    <button id="calibrate-button" type="button">Nullpunkt</button>
    <span id="serial-status">Nicht verbunden</span>
    <span id="serial-values">J1 --/-- J2 --/--</span>
</div>

<!-- p5 creates and appends its own canvas in setup() -->

<script src="index.js"></script>

</body>
</html>
